# ============================================================
#  WellLabs Solution Explorer — Nginx Configuration
#  Stored in repo: devops/nginx/welllabs.conf
#  Deployed to: /etc/nginx/sites-available/welllabs.conf
#               by devops/scripts/after_install.sh
#
#  PORT MAP — PERMANENT, NEVER CHANGES:
#    :80  /api/*  → proxy → Express backend  :8000
#    :80  /       → proxy → serve (React)    :3000
#    :27017       → MongoDB (local, internal)
# ============================================================

server {
    listen 80;
    server_name _;

    # ─────────────────────────────────────────────────────────
    # Backend: Express REST API (always :5000)
    # ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass          http://127.0.0.1:5000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        '';

        # Retry on brief restart window (zero-downtime deploy)
        proxy_next_upstream error timeout;
        proxy_next_upstream_tries 3;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Allow large GeoJSON payloads
        client_max_body_size 50M;
    }

    # ─────────────────────────────────────────────────────────
    # Frontend: React SPA via `serve` (always :3000)
    # ─────────────────────────────────────────────────────────
    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        '';

        # Retry on brief restart window
        proxy_next_upstream error timeout;
        proxy_next_upstream_tries 3;

        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;
    }

    # ─────────────────────────────────────────────────────────
    # Gzip compression
    # ─────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml
                    text/javascript application/x-javascript;

    # ─────────────────────────────────────────────────────────
    # Security headers
    # ─────────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"             always;
    add_header X-Content-Type-Options "nosniff"                always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # ─────────────────────────────────────────────────────────
    # Logging
    # ─────────────────────────────────────────────────────────
    access_log /var/log/nginx/welllabs-access.log;
    error_log  /var/log/nginx/welllabs-error.log warn;
}
