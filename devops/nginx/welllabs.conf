# ─────────────────────────────────────────────────────────────
# CORS helper map
# ─────────────────────────────────────────────────────────────
map $http_origin $cors_origin {
    default                           "$scheme://$host";
    "~^http://localhost(:[0-9]+)?$"   "$http_origin";
    "~^https://localhost(:[0-9]+)?$"  "$http_origin";
    "~^http://13\."                   "$http_origin";   # any EC2 IP in 13.x.x.x
    "~^https?://climatesolutions\.ai$" "$http_origin";
    "~^https?://blr\.climatesolutions\.ai$" "$http_origin";
}

# ─────────────────────────────────────────────────────────
# FRONTEND SERVER: React SPA via `serve` (:3000)
# ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _ climatesolutions.ai blr.climatesolutions.ai;

    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        '';
        
        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;
    }
}

# ─────────────────────────────────────────────────────────
# BACKEND SERVER: Express REST API (:5000)
# ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _ api.climatesolutions.ai;

    location / {
        # ── CORS: handle OPTIONS preflight ───────────────────
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'Authorization, Content-Type, Accept, X-Requested-With' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age           86400 always;
            add_header Content-Length                   0;
            add_header Content-Type                     'text/plain charset=UTF-8';
            return 204;
        }

        # ── CORS: inject headers on real requests ─────────────
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers     'Authorization, Content-Type, Accept, X-Requested-With' always;
        add_header Access-Control-Allow-Credentials 'true' always;

        # ── Proxy to Express ──────────────────────────────────
        proxy_pass          http://127.0.0.1:5000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        '';

        proxy_hide_header   Access-Control-Allow-Origin;
        proxy_hide_header   Access-Control-Allow-Methods;
        proxy_hide_header   Access-Control-Allow-Headers;
        proxy_hide_header   Access-Control-Allow-Credentials;
    }
}
