# ============================================================
#  WellLabs Solution Explorer — Nginx Configuration
#
#  PORT MAP — PERMANENT, NEVER CHANGES:
#    :80  /api/*  → proxy → Express backend  :5000
#    :80  /       → proxy → serve (React)    :3000
#    :27017       → MongoDB (local, internal)
# ============================================================

# ─────────────────────────────────────────────────────────────
# CORS helper map — evaluates the incoming Origin header.
# If the origin matches, $cors_origin echoes it back;
# otherwise it defaults to the server's own origin so that
# browsers still get a valid header (avoids empty-string errors).
# ─────────────────────────────────────────────────────────────
map $http_origin $cors_origin {
    default                         "$scheme://$host";
    "~^http://localhost(:[0-9]+)?$" "$http_origin";
    "~^https://localhost(:[0-9]+)?$" "$http_origin";
    "~^http://13\."                 "$http_origin";   # any EC2 IP in 13.x.x.x
    "~^https?://.*\.yourdomain\.com$" "$http_origin"; # add your real domain here
}

server {
    listen 80;
    server_name _;

    # ─────────────────────────────────────────────────────────
    # Backend: Express REST API (always :5000)
    # ─────────────────────────────────────────────────────────
    location /api/ {
        # ── CORS: handle OPTIONS preflight ───────────────────
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers     'Authorization, Content-Type, Accept, X-Requested-With' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age           86400 always;
            add_header Content-Length                   0;
            add_header Content-Type                     'text/plain charset=UTF-8';
            return 204;
        }

        # ── CORS: inject headers on real requests ─────────────
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header Access-Control-Allow-Headers     'Authorization, Content-Type, Accept, X-Requested-With' always;
        add_header Access-Control-Allow-Credentials 'true' always;

        # ── Proxy to Express ──────────────────────────────────
        proxy_pass          http://127.0.0.1:5000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        '';

        # Remove any CORS headers the Express app itself sets
        # (avoids duplicate header errors in browsers)
        proxy_hide_header   Access-Control-Allow-Origin;
        proxy_hide_header   Access-Control-Allow-Methods;
        proxy_hide_header   Access-Control-Allow-Headers;
        proxy_hide_header   Access-Control-Allow-Credentials;

        # Retry on brief restart window (zero-downtime deploy)
        proxy_next_upstream error timeout;
        proxy_next_upstream_tries 3;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Allow large GeoJSON payloads
        client_max_body_size 50M;
    }

    # ─────────────────────────────────────────────────────────
    # Frontend: React SPA via `serve` (always :3000)
    # ─────────────────────────────────────────────────────────
    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Connection        '';

        # Retry on brief restart window
        proxy_next_upstream error timeout;
        proxy_next_upstream_tries 3;

        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;
    }

    # ─────────────────────────────────────────────────────────
    # Gzip compression
    # ─────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/json
                    application/javascript text/xml application/xml
                    text/javascript application/x-javascript;

    # ─────────────────────────────────────────────────────────
    # Security headers
    # ─────────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"             always;
    add_header X-Content-Type-Options "nosniff"                always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # ─────────────────────────────────────────────────────────
    # Logging
    # ─────────────────────────────────────────────────────────
    access_log /var/log/nginx/welllabs-access.log;
    error_log  /var/log/nginx/welllabs-error.log warn;
}
