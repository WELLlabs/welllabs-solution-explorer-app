version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "[BUILD] Node.js version $(node -v) | npm $(npm -v)"
      - npm install -g serve

  pre_build:
    commands:
      - echo "[PRE-BUILD] Installing frontend dependencies..."
      - cd frontend && npm ci && cd ..

  build:
    commands:
      - echo "[BUILD] Setting VITE_API_URL to http://$EC2_IP:5000/api..."
      - export VITE_API_URL="http://$EC2_IP:5000/api"
      - echo " VITE_API_URL=$VITE_API_URL"
      - cd frontend && npm run build && cd ..
      - echo "[BUILD] Build complete."

  post_build:
    commands:
      - echo "[POST-BUILD] Finished at $(date)"

artifacts:
  files:
    - '**/*'
  discard-paths: no
  base-directory: '.'